version: '3.8'

services:
  # Backend service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: drug-trace-backend
    ports:
      - "1500:1500"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    networks:
      - drug-trace-network
    restart: unless-stopped

  # Frontend service
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: drug-trace-admin
    ports:
      - "1501:1501"
    depends_on:
      - backend
    networks:
      - drug-trace-network
    restart: unless-stopped

networks:
  drug-trace-network:
    driver: bridge
